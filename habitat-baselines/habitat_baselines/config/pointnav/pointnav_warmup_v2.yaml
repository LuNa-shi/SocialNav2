# @package _global_

# Note this config here only for reproducibility's sake.
# ppo_pointnav.yaml contains the known best practices
# and should be used as the starting point instead.

defaults:
  - /habitat: habitat_config_base
  - /habitat/dataset/social_nav_v2: social-hm3d
  - /habitat_baselines: habitat_baselines_rl_config_base
  - /habitat/task: pointnav
  - /habitat/simulator/sensor_setups@habitat.simulator.agents.agent_0: spot_agent
  - /habitat/simulator/agents@habitat.simulator.agents.agent_0: spot
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_stop: discrete_stop
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_move_forward: discrete_move_forward
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_turn_left: discrete_turn_left
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_turn_right: discrete_turn_right
  - /habitat/task/lab_sensors@habitat.task.lab_sensors.agent_0_pointgoal_with_gps_compass: pointgoal_with_gps_compass_sensor
  - _self_

habitat:
  environment:
    max_episode_steps: 500
  dataset:
    split: train
  simulator:
    type: RearrangeSim-v2
    agents_order: [agent_0]
  task:
    actions:
      agent_0_discrete_stop:
        lin_speed: 0.0 
        ang_speed: 0.0
      agent_0_discrete_move_forward:
        lin_speed: 25.0
        ang_speed: 0.0
        allow_dyn_slide: True
      agent_0_discrete_turn_left:
        lin_speed: 0.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_0_discrete_turn_right:
        lin_speed: 0.0
        ang_speed: -10.0
        allow_dyn_slide: True

habitat_baselines:
  evaluate: False
  verbose: False
  trainer_name: "ddppo"
  torch_gpu_id: 0
  tensorboard_dir: "evaluation/pointnav_stage1/tb" # Using a separate directory for stage 1 logs
  video_dir: "evaluation/pointnav_stage1/video"
  test_episode_count: -1
  num_environments: 8 # Aligned with social nav config
  checkpoint_folder: "evaluation/pointnav_stage1/checkpoints_731" # Using a separate directory for stage 1 checkpoints
  total_num_steps: 15e6 # A reasonable starting point for pre-training
  log_interval: 10
  num_checkpoints: 20
  num_updates: -1
  force_torch_single_threaded: True
  load_resume_state_config: False

  eval:
    video_option: [ ]
    # Can be uncommented to generate videos.
    # video_option: ["disk", "tensorboard"]

  rl:
    policy:
      agent_0:
        name: "Adapt3RPolicy"

  

    ppo:
      # ppo params
      clip_param: 0.1
      ppo_epoch: 4
      num_mini_batch: 4
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 2.5e-4
      eps: 1e-5
      max_grad_norm: 0.5
      num_steps: 128
      hidden_size: 512
      use_gae: True
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: True
      use_linear_lr_decay: True
      reward_window_size: 50

      use_normalized_advantage: True

    ddppo:
      # This entire section is copied from your social nav config to ensure an identical model architecture.
      sync_frac: 0.6
      distrib_backend: NCCL
      pretrained: False
      pretrained_encoder: False
      train_encoder: True
      reset_critic: True
      rnn_type: GRU
      num_recurrent_layers: 1
    
      # --- Adapt3R Configuration ---
      # This block MUST be identical to your social nav config's Adapt3R block.
      adapt3r:
        visual_encoder:
          backbone_type: "clip"
          hidden_dim: 126
          num_points: 256
          do_image: True
          do_pos: True
          do_rgb: False
          finetune: False
          xyz_proj_type: "nerf"
          clip_model: "RN50"
          do_crop: True
          boundaries: [[-5.0, -5.0, 0.0], [5.0, 5.0, 3.0]]
          # lowdim_obs_keys are simplified, containing only the navigation sensors.
          # Social sensors like 'human_num_sensor' are removed for this stage.
          lowdim_obs_keys:
            - "pointgoal_with_gps_compass"
