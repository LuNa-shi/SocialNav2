# @package _global_

# Note:  This is an example config, see habitat-baselines/habitat_baselines/config/pointnav/ppo_pointnav.yaml
# for better hyperparameters for actual training

defaults:
  - /benchmark/nav/pointnav: pointnav_habitat_test
  - /habitat_baselines: habitat_baselines_rl_config_base
  - _self_

      

habitat_baselines:
  trainer_name: "ddppo"
  torch_gpu_id: 0
  tensorboard_dir: "tb"
  video_dir: "video_dir"
  # To evaluate on all episodes, set this to -1
  test_episode_count: 2
  eval_ckpt_path_dir: "data/new_checkpoints"
  num_environments: 8
  checkpoint_folder: "evaluation/pointnav_stage1/checkpoints_8_1_2"
  num_updates: -1
  total_num_steps: 1e6
  log_interval: 10
  num_checkpoints: 50
  # Force PyTorch to be single threaded as
  # this improves performance considerably
  force_torch_single_threaded: True
  load_resume_state_config: False


  eval:
    video_option: [ "disk", "tensorboard" ]

  rl:
    ppo:
      # ppo params
      clip_param: 0.1
      ppo_epoch: 1
      num_mini_batch: 1
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 2.5e-4
      eps: 1e-5
      max_grad_norm: 0.5
      num_steps: 32
      hidden_size: 256
      use_gae: True
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: True
      use_linear_lr_decay: True
      reward_window_size: 50


    policy:
      # Adapt3R policy for the main agent
      main_agent:
        name: "Adapt3RPolicy"
        action_distribution_type: "categorical"


    ddppo:
      sync_frac: 0.6
      # The PyTorch distributed backend to use
      distrib_backend: NCCL
      pretrained_weights: pretrained_model/latest_730.pth
      # Adapt3R: No pretrained weights available
      pretrained: True
      pretrained_encoder: False  
      train_encoder: True
      # Whether to reset the critic linear layer
      reset_critic: True
      rnn_type: GRU       # Default, but Adapt3R uses its own RNN config  
      num_recurrent_layers: 1
      # Adapt3R-specific configuration
      adapt3r:
        visual_encoder:
          backbone_type: "clip"     # 使用 resnet18 更稳定，没有预训练模型
          hidden_dim: 126               # 必须能被6整除 (NeRF positional encoding)
          num_points: 256               # 点云采样数量
          do_image: True                # 使用视觉特征
          do_pos: True                  # 使用位置编码
          do_rgb: False                 # 不使用原始RGB
          finetune: False                # 训练视觉编码器 (没有预训练模型)
          xyz_proj_type: "nerf"         # NeRF 位置编码
          clip_model: "RN50"            # CLIP模型 (如果使用CLIP backbone)
          
          # 点云处理配置
          do_crop: True                 # 启用点云裁剪
          boundaries: [[-5.0, -5.0, 0.0], [5.0, 5.0, 3.0]]  # 裁剪边界 
          
          # 低维观测键 (导航相关传感器)
          lowdim_obs_keys: 
            - "pointgoal_with_gps_compass"
    
